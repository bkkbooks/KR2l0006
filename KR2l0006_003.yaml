body:
  text: 玉堂雜記卷下宋周必大撰咨報見於金坡遺事元豐三年八月丙申亦詔於尚書省樞密院用咨報至今守之其制首題學士院咨報尚書省或中書門下樞密院次入詞云云末云右謹具咨報某省伏候裁㫖後題年月學士押字雖中間權臣用事官失其職獨此不廢又三省密院於百司例用劄付惟學士院云劄送他官司得省劄必前連片紙書所受月日乃敢押字惟學士院徑判押其首又吏魁有録事曹案曰房皆稍擬中書尊內庭也祖宗時內制多避兩府親嫌亦有不許避者蘇文忠公之於弟文定公是也然終不自安乞郡而去紹興初范元良沖除學士以趙丞相鼎姻家特復置侍讀學士以處之及秦丞相檜當國兄梓實為學士子熺繼為學士承旨亦嘗為禮部侍郎雖並緣元祐故事其實非也國初久為學士官至八座已罷職或再來直院神宗改官制後中丞并權六曹尚書若兼內制亦止云直學士院舒亶等是也中興初詹乂已為龍圖閣學士猶曰權直院其他如正侍郎已下多帶兼權汪藻等是也厥後程克俊林待聘楊願等初以給舍兼權稍久乃落權字以為恩數至正尚書則帶兼權學士胡交修等是也乾道三年洪景盧邁奏請自庶官遷侍從便落權字正兼直院故先以起居郎權直院既遷中書舍人即落權字庚辰秋豫以少蓬兼權直院明年正除權禮部侍郎吏引近制申明合正為直院豫固抑之兼權如故翰長王日嚴嚴亦不復問其後王季海淮以太常少卿兼權直院既除正字即徑落權遂為定例淳熙五年十二月必大自翰林遷禮書乃正兼學士蓋上所兼之官在正官下者皆不帶權非舊例也六年十一月遷吏書又升兼學士承㫖且有內批付院云天官事繁今後非特㫖撰述其餘並免上自登極至今將二十年正除翰苑才七八人皆登二府惟王日嚴以年踰七十除端明殿學士而去乾道癸巳曾丞相懷鄭參政聞張樞密說在二府或薦新改官正字崔大雅興詩入內庭以其資淺乃創翰林權直之名月俸減學士直院三之一自學士承㫖至庶官兼權直院者俸給一等院中餐錢不減明年冬以父憂去尋丁母憂戊戌秋服闋復召為密院編修官史丞相浩當國下史院訂論兼職名稱遂改為學士院權直蓋以翰林乃內諸司總名難專指學士院也淳熙己亥明堂大禮崔大雅已遷著作權直如故糧料院止隨其官幫支賜二十匹兩大雅以狀申祕書省省申朝廷趙丞相雄將上取㫖遂用月俸例支學士三之二祖宗試文多在學士院近嵗惟試館職耳既得省劄召某人試即下太史局擇日報內侍省差官一員充監門前一日學士宿院進䇿題候內批依次早乃引試支左藏庫錢三十緡充餐錢試畢録䇿題并試卷依紹興三十年司諫何通逺溥以為言太上欲復故事而人頗憚試首召朱熙載等次召劉儀鳯等皆辭不就太上諭湯丞相思退等擇二人必令試且云蘇軾中制科猶試况餘人乎於是以豫及同年程泰之大昌應詔具宣上㫖乃不敢辭已而太上欲除校書郎或謂過江選人無此例止除正字乾道六年九月豫以祕書少監寓直翰苑發䇿試王仲衡希吕嘗賦詩寄程同年云當年給札踏金鑾重到依然九月寒學士䇿詢學士䇿館職亦合呼學士祕書官試祕書官自憐緑鬢非前度尚喜青衫總一般時豫服緑寄語浙東程閣老程時為浙東提刑兼權帥事亦嘗暫直翰苑莫矜紅斾笑儒酸程答詩末句云有底滑稽堪美處金蓮燭底話窮酸始豫庚辰九月與程同試兩人名皆有大字明年試蔣芾苪燁姓名俱連草頭又明年試王東里程千里名連里字頻嵗偶爾亦可書也按祖宗朝館職者指昭文集賢史館之職也在內多升修注出外則為帶職凡轉官奏補恩數皆厚故艱其選必試而後除亦以限止無能之人自神宗罷館職止是祕書省官與其他職事官無當不當尚循館職之名况狀元不試餘人多徑除著作丞郎所試者校書正字而已舊制云試前一日學士宿院故元祐中蘇文忠公與鄧文惠公溫伯各進䇿題禁中㸃用文忠所作及豫與程同試時學士洪景嚴兵部尚書兼權學士楊元老椿亦並入至是豫與鄭仲益同直鄭為長官典故浸移乃始輪入不敢强之其後豫再直丙申二月召試許蒼舒遂修故事約程元成叔達並入䇿題則輪撰隆興初上用真宗故事輪講筵學士院官直宿禁林每多兩員以備宣引咨訪往往賜酒留欵其後以兩人難獨召若同召則議論難盡止命一員遞宿自後益遴其選或國忌妨行香若有故員少及大暑皆權免間遇除授宣鎖講筵官已入直率聞命蒼皇而出至有不及伺候從吏借馬於內諸司者或偶值本院官直宿就留鎖院若大除拜當有錫賜則不係當日與否往往特宣云每直兩日謂之頭直末直紹興辛巳明堂禮成以完顔亮背盟十月四日詔今次明堂大禮合加恩臣僚權宜不鎖院不宣麻止降制給告並免辭免候事定日依舊隆興二年邊事改卜郊乾道二年冬雷罷二相皆未暇舉行乾道六年必大始奏復舊制內制名色不一儤直時或未詳其體式故凡詞頭之下者院吏必以片紙録舊作於前謂之屏風兒子嘗跋王岐公蘇文定公詔草及謝表備言之至今不廢蓋其來久矣國初陶穀謂一生依本畫葫蘆殆謂是耶凡鎖院或親被㫖或受熟狀本院即關閣門今月某日有鎖院事閣門得之即關報御史臺集文臣職事官承務郎釐務官通直郎已上明日赴文德殿聽麻宰相樞密皆不往惟輪參知政事一員押麻麻卷自內出閣門啓御封兩吏對展宣贊舍人南面搢笏義手大聲擲首尾詞及階位姓名下數句并所除之官而讀之不盡宣也聽訖知閣門官以授參政參政付中書吏百官不拜而退若大詔令及冊后之類則宰執文武百僚俱入文亦盡讀拜舞然後退禁中以鎖院為重淳熙三年慶夀赦凡降麻官合加恩者用辛巳明堂例免鎖院宣制仍勿辭免九月三日中書進熟狀魏王愷恩平郡王璩永陽郡王居廣並加食邑食實封只乞降付院草制內夫人失於詳閲宣鎖程直院是夜進草明日告廷如式又明日內批付密院典字直筆吳慶慶降充紫霞帔不令供職主管大內公事慶國淑懿夫人劉從信降兩字夫人蓋懲其誤也凡非時宣召院官侍從已下及外官而內引者同紫窄衫絲絇行入殿廊有小黃門來導至便坐上服紅半臂忌前用黃黃門贊拜揖升殿奏對訖上曰且坐先已設小兀子得㫖則側身虛揖而坐將退黃門贊云宣坐賜茶於是中官進御前者中使授臣僚者賜酒亦然所用杯不同侑以果實一柈其器分大小若二府則黃門雙導上亦服窄衫宰相樞使坐髙兀子執政紫團坐而低賜茶酒亦如之或曲宴則酒五行亦或加多每杯賜食初無定制中興後凡除拜節鉞以上多由中書進熟狀院吏云鎖中左選者文臣也右選者武臣也逐房臨時呼院吏取索是以知之惟草后妃太子宰相麻則不容知快行數十輩來宣召云鎖小殿子既至便殿上服帽帶諭以除授之意御前列金器如硯匣壓尺筆格糊板水滴之屬幾二百兩既書除目隨以賜之隆興初猶用此例乾道以後止設常筆硯而已退則有㫖打造不及例賜牌子金百兩立后升儲倍之凡除拜加恩官在都下者既宣麻而院吏私録本走報希覬贈遺初無公移也而被受之官辭免者多云準學士院報麻除授云云此非典故不應相承以為例奬諭臣僚或降詔或敕書院中自有定式近嵗如大理獄空及監司守臣有勞績若是庶僚皆合降敕書三省樞密院往往誤批降詔院吏隨所得㫖而行不敢正也翰苑印以翰林學士院印六字為文背鐫景德二年少傅監鑄上兩字微刓自南渡凡百司印無如此久者尚書六曹惟禮部印是舊物然亦元豐改官制後所鑄蓋文書稍簡故不刓耳紹興辛巳五月詔學士院權寓皇城司而以院為欽宗几筵殿終制復舊學士院舊號北門今在行宫和寧門內蓋沿北門之制地迫皇城極為窄隘汪尚書應辰兼權學士時上屢令增葺竟以無地步而輟㕔後即堂緣近嵗院官止二員故分東西兩閣中有小龜頭榜曰摛文堂蓋昔時徽宗因廣直盧御書以賜强承㫖淵明今乃汪彥章內翰藻所篆太上又嘗書玉堂二字賜學士周茂振鱗之刻石㕔上東閣窗下甃小池久無雨則涸傍植金沙月桂之屬又有海棠郁李繡毬各一株西偏值金橘逼城根株不能大花開時香滿院結實雖小而甘浙中未易得也淳熙己亥夏侍講兵部尚書兼給事中王仲衡入直示兩絶句云玉堂晝永暑風微蔌蔌飛花落小池徙倚幽欄慿問訊夏鶯飛出萬年枝小池倒影弄餘輝照耀虛簷極出竒木杪不鳴風力軟闖萍翻藻有魚嬉豫次韻云東省南宫切太微䕫龍行集鳯皇池更哦殿閣薰風句坐覺微涼生桂枝紫禁同依日月輝蒼顔獨愧羽毛竒水如明鏡雖堪俯笑汝星星誰肯嬉豫嘗發䇿試仲衡至是同為八座俱在講筵唱酬頗多是時詩及院中景物故記於此朝殿日皇太子宰相親王使相參政各有朱衣史二人自下馬處前導至殿門樞密使恩數依宰臣者同若知院及副樞簽書則紫衣此外惟翰林學士有之又禁門內許以茶鐐擔豫自隨與執政等車駕將出宴享或過宫則應奉官及侍從以上朝于後殿宰執有奏事侍從先退例玉堂少憩若值冬至元正則團拜堂上俟駕過就院門外上馬以從南渡以來朝臣遇節序賜豫多權停今經筵寒食重午冬至尚賜節料錢酒其他侍從則三大節客省簽賜羊酒米麵而學士院官若侍從以上兼領自從本官或庶僚權直院獨三伏賜氷一擔時果五品品才一楪亦因與經筵官輪宿而得之書局自有中官承受凡遇時節例賜茶酒學士院無承受故也淳熙乙未初伏必大以待制侍講賜流香酒四斗後二年減半時果七楪冰一擔視庶官直院為稍增以短表謝支快行家食錢三千又折酒錢三百别賜氷一擔翰林司關子云限日下支不許次日支食錢一千蓋侍從所得者十月旦賜錦襖子學士院觀察使簇四金鵰尚書執政八搭暈錦宰臣使相天下樂例從左帑幫支得不以時臨期隨品色假為領袖施之朝服三日而止識者非之豫自翰苑遷八座己亥十月值從駕恭謝景靈宫兵部尚書王仲衡未達朝儀第用市錦豫告之故計無所出豫輟所服與之而馳取舊金鵰者自用暨追班閣門吏魁趙軫與其徒顧豫誶語豫悟其意呼而告以雖班尚書猶兼翰林學士故可捨髙從卑軫等愧謝而退渡江後每遇開講罷講臨安治具侍講讀修注官紹興三十二年冬豫為左史趙清卿子肅知臨安初獻議盡罷百司饋送及所供飲饌時洪景嚴以內翰兼侍讀開講日學士院自置酒五行自後遂為例乾道六年豫與鄭仲益兼直院鄭兼侍講是秋開講鄭主席謂豫亦院官當與其事豫但簽書招客之目而以不兼講讀不赴坐時胡邦衡銓以工侍兼侍講坐中賦覃字韻詩見及豫次其韻有云寓直敢同東道主蓋謂是也翰林學士初上舊制敕設甚盛中興後不復舉行豫直院時除王日嚴為學士院中支餐錢具五杯而已故事大宴未再坐間學士院常為館閣官具食蓋祖宗時內外制官無不自三館出館中之人往往前日僚友之舊道義之交不專以勢利髙下為心故每於是日小集從容談笑也近時具食雖如故乃設於學士院門幕次內蓋未嘗見玉堂主人也竊意前輩不爾淳化中太宗以飛白玉堂等四字賜翰林而學士承㫖蘇易簡㑹兩制於玉堂直祕閣潘謹修與焉略可見也已上乃近世程致道俱麟臺故事所記乾道七年天申節貢院賜齊筵豫時以少蓬兼內直乃督院吏治具吏白厨庫乏錢兼近已不講豫曰故事既難廢况豫身二祕書而罷此禮乎命如故例然不過盤餐之類爾必大久在翰苑獨員之日常多率數月輒丏去上必批降詔不允院吏申省乞時暫差官撰述乃委中書舍人如此再三遂為定例徑封奏劄付中書後省數年來上數令薦詞臣為代明示大用意必大每退避戊戌九月丁丑御藥院傳㫖問近例院官有無三員者吏具上初政承㫖洪遵學士史浩直院劉珙又問紹興間故事吏復具八年曾開勾龍如淵皆為直院而召孫近承㫖三十一年何溥為學士虞允文劉珙並直院後旬餘崔大雅服闋還朝上曰卿來適其時遂再兼權直十月復增莫子齊濟尋卒其後繼增趙大本彥中熊子復克豫遂參預玉堂雜記卷下
