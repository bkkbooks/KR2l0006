body:
  text: 玉堂雜記卷上宋周必大撰錢文僖公惟演金坡遺事云舊規學士六人遇聖節共率百二十緡寺中設齋今送五十千與樞密使同開道塲前一日赴宴當時所記如此近嵗樞密院滿散聖節及貢院賜宴則學士待制皆與而無送錢故事又六參隨樞密班先入止是再拜不舞蹈并遇宣麻不往皆内朝故事也金坡遺事又云聖節唐時惟六學士及二使謂中官樞密使赴待詔雖發書屈亦不與坐又云夲朝淳化五年十月上賦詩一首今待詔吳郢張用和齎以示學士張洎錢若水又李昌武宗諤翰苑雜記學士初授中謝前一日待詔一名至私第宣召入院聽口宣舞蹈訖揖待詔上階相見具酒果迎待即以事例物并書致於待詔前熙寜間司馬文正公日記云初除學士待詔李堯卿宣召設香案褥位於庭望闕堯卿稱有敕光再拜堯卿口宣云云光每句應喏畢再拜舞蹈又再拜升階與待詔坐啜茶蓋中朝舊典也今學士院有待詔四人或右選或白身予為學士忠翊郎錢滋來宣召大略如李馬二公所記而無對揖茶酒之禮例支十千辭云自來虚喝不敢受予强予之常日學士入院坐堂上朱衣吏初贊喝東院録事某人以下躬喏訖又喝云各祗候次贊喝西院某人以下亦如之最後平贊云待詔既不名亦不喝各祗候則待詔與院吏固亦有間若平居則視之全與吏等無由待以茶酒豈將命時不欲吏之邪抑祖宗時所遣或翰林他局之待詔邪然唐制發書屈赴聖節禮已厚矣李仁父燾續通鑑長編開寳二年太祖命李昉盧多遜分直學士院昉前在翰林堂吏因事至者每拜堂下事已即遣未嘗與坐至是拜堂上更展叙中外無復曩日之禮昉愕然詢同列則云數年矣司馬文正公日記云熙寜二年五月癸巳鎖院以奉安二御容禮成徳音降西京囚杖以下放是日丞相出中書提㸃魏孝先以下入院授以參政趙抃所封御前劄子茶湯舘于虚閣御藥劉有方來茶湯館于門塾復謁御厨翰林設食致酒果黄昏進首尾詞内批依此修寫四鼓起讀㸃句攅㸃進入明日丞相退朝宣訖開院淳熙三年十一月八日必大被宣草十二日冬祀赦黄昏方至院御藥持御封中書門下省熟狀來繫鞵迎于中門同監門内侍一員俱升㕔御藥先以熟狀授監門共茶湯訖先送御藥出院復與監門升㕔受熟狀付吏又㸃湯送監門下階館之門塾而不報謁既熟狀自内出非參政所封故提㸃官不來惟中書門下省刑房録事尚書省刑房主事各一人穿秉同至仍舊繫鞵見之不迎不送不設茶湯而退守當官四人貼房十數人旅揖階下與文正公所記多不同至六年九月十二日復被宣草明堂赦御藥張安中監門梁襄相見如儀惟録事沈楧主事李師文茶而不湯院吏云前不設茶誤也守當官等不復廷揖所謂酒饌之賜今皆無之詰朝奏知先出而吏卒輩皆俟三日後宣赦訖乃得歸太上初遜位上尊號時陳丞相康伯當國集議定命學士洪景巖遵撰議文然後降詔必大時任察官心知其非而無由改乾道六年郊祀禮成加上尊號必大在翰苑始引唐故事乞上帥羣臣過宫表請既允然後降詔國朝止有人主上母后尊號故冊文稱嗣皇帝靖康上教主道君之號徐丞相處仁已命汪彦章藻代作冊文會有疆事不及行禮紹興三十二年初上徳夀尊號乃承例用嗣皇帝乾道六年上既表加乞上尊號而院吏寫表亦稱嗣皇帝私謂未安謹按唐明皇傳位後顔真卿議肅宗不當於宗廟稱嗣皇帝况親奉表徳夀乎以白虞丞相允文丞相難之必令尋例必大思建炎以後遇節朔遙拜徽宗表是時翰苑多名士必不誤用乃督吏搜舊牘明日果得表本一冊止稱皇帝又按韓文順宗實録載憲宗上順宗尊號冊文亦稱皇帝臣某此最可據其議遂定是嵗初議於太上皇帝尊號中加憲天體道四字皇后加慈明二字必大草詔云太上皇帝與天同大體道之宗太上皇后如月之明以慈為寳盖取文意之順耳將宣布而議者謂天聖二年賜太宗女申國大長公主諡曰慈明當避於是改用明慈二字宰執云詔書先明而後慈殆黙定也必大與同直院鄭仲益聞既分草皇帝請加上太上皇帝皇后尊號牋表諸公謂太上皇帝自當答誥頗疑皇后難於措辭必大請以意共為答誥文意所及總言父母以該之而不稱予吾之類遂草以進上甚以為然凡兩答誥皆必大所草也上於文字尤欲得體一覽便見是非必大草太上辭尊號第一誥其末云怡神閒燕何力之有上曰此雖道太上語畢竟自此起草送去何力之句不能無嫌必大遂改作無累於物盖上用意至到如此淳熙二年六月禮部太常寺申來年太上皇帝當慶七十欲將國朝加上尊號并夀典禮參酌比附先次討論壬申有㫖恭依七月乙酉侍從禮官等就都堂議加性仁立徳至神無為八字而皇后再加二字為齊明廣慈後兩日禮部趙侍郎雄謂無為二字與太上字相連頗渉語忌請改為明武煥文其後又嘗作至神無為又作成武煥文逮癸卯乃定用性仁立徳無為全美參政龔實之茂良而下尚不以為然葉丞相衡既主之衆莫能奪八月直院胡長文元質罷丁卯上自用必大再直已擬詔草㑹九月乙未葉丞相罷龔參首招予及學士王季海共議然後定為性仁誠徳經武緯文遂草宣布詔其頌太上皇帝云以徳行仁本性誠之固有修文偃武合經緯之自然太上皇后云月齊日以得天而能久照坤順乾而配地是以廣生上再三稱奬謂數句用經語該括明備非卿不能為真大手筆也大禮降御劄既云劄示則當親筆付外近嵗同常詔從院吏寫本行出未知中朝舊事如何乾道九年六月七日宣當直學士草南郊御劄三更進草其間云乾清坤夷振四方之綱紀星暉海潤兆百世之本支玉巵每奉於親闈瑞節嵗交於鄰境上改作農扈屢豐戎軒載戢崇禮樂而四達嘉風俗而再淳玉巵每奉於親闈美化遂刑於海宇仍批云可改簽抹者五句意不近於郊祀其欲得體大率如此己亥三月丁卯詔今嵗郊祀以例約束省費旋有㫖未令行出下禮部太常寺議明堂大禮初李仁父主此説於前郊嘗經集議㑹近習揚言燾博極羣書却不曽讀孝經乃不果行至是予以禮部尚書兼翰林學士與諸儒議曰周公雖攝政而主祭則成王王方幼冲故周公參稽古制蕆事於明堂其曰嚴父者指周公能推本武王之志追尊文王之功非謂自主其祭祀也衆以為然遂奏臣等竊觀傳載黄帝拜祀上帝於明堂唐虞祀五帝於五府歴時既久其詳莫得而聞至禮記始載明堂位一篇言天子負斧依南鄉而立内之公侯伯子男外之侯甸要荒以序而立故曰明堂也者明諸侯之尊卑也孟子亦曰明堂者王者之堂也周禮大司樂有冬至圜丘之樂夏至方丘之樂宗廟九變之樂三者皆大祭祀惟不及明堂豈非明堂者布政㑹朝之地成王時嘗於此歌我將之頌宗祀其祖文王乎後暨漢唐雖有沿革至於祀帝而配以祖宗多由義起未始執一本朝仁宗皇祐中破諸儒異同之論即大慶殿行親享之禮並侑祖宗從以百神前期朝獻景靈宫享太廟一如郊祀之制太上皇帝中興斟酌家法舉行於紹興之初亦在殿庭葢得聖經之遺意且國家大祀有四春祈穀夏雩祀秋明堂冬郊祀是也陛下即位以來固嘗一講祈榖四躬冬祀惟合宫雩壇之禮猶未親行今若特舉秋享於義為允臣等謹據已行典禮及將前代賀循本朝名儒李泰伯范鎮明堂嚴祖説并治平中吕誨司馬光等集議近嵗李燾奏劄具録以聞乙亥有㫖從之九月上辛以顯肅后忌前改用仲辛行禮辛酉當受誓戒前一日上語宰執足指瘡腫恐妨拜跪欲展季辛又值顯恭后忌如何宰執奏天地尊后忌卑遂降㫖用二十六日必大按漢武太初太始征和中屢祀明堂不専用辛方請别卜日詰朝上忽遣中使諭㫖都堂夜來傅藥足瘡良愈不必改日但已展誓戒之期若再降㫖不張皇否趙相奏此却無妨遂以是日午時集官受誓戒丙寅大雨丁卯鎖院草赦戊辰百執事冒雨入麗正門過後殿請皇帝致齋已巳上乗逍遙車朝獻景靈宫入太廟宿齋四日之間雨晝夜傾注通衢殆如溪澗有㫖來早不乗玉輅止用逍遙車徑入北門趍文徳殿致齋朝服導駕官皆改常服應儀仗排立人並放趙相為大禮使密諭有司未得放散黄昏後雨驟止夜分内侍李思恭傳㫖御史臺閤門大常寺仍舊乗玉輅應合行事件疾速施行庾午昧爽駕來登輅必大執綏上喜曰且得晴霽辛未行禮月色如晝上拜起不倦以迄于成黎明登樓肆赦簪花過徳夀宫人情熙然赦書乃必大視草其間云惟周成宗祀洛中陟配於文王惟漢武合祠汶上推嚴於髙帝皆用親郊之禮具殫尊祖之誠於鑠本朝若稽前代俶經路寢有皇祐之彛儀徧秩羣神有紹興之近制不愆于素可舉而行葢欲明著古禮以示來世也後數日加恩羣臣必大復草趙相制云祼將太宫霖潦驟霽陟恪大寢月華正中又云鎮定大事如彦博之恢宏貫通羣經如宋庠之博洽皆紀一時之事且以仁宗初行明堂二公實為相也大禮赦條乃六部諸司條具上省省中類聚取㫖訖即進熟狀降付學士院草赦文本院并首尾詞大書進入其間多云當議將上取㫖葢有司擬申如此既經畫㫖行赦便是處分不應仍舊用當議二字必大為學士諭令削去院吏持不敢遂親以筆塗之大禮上乗玉輅率命翰林學士執綏備顧問近嵗多闕正員臨時選差他官與五使同降㫖淳熙丙申南郊己亥明堂必大再為之按京師用唐顯慶輅嘗以登封其安固可知元豐改造已不能及今乃紹興癸亥嵗所製上自太廟服通天冠絳紗袍乗輦至輅後由木陛以登惟留御藥二宦者侍立執綏官先從旁用小梯攀縁而上衛士以綵繩圍腰繫以箱柱輅行頗搖兀宸躬亦覺危坐云大禮後上御樓揭雞竿肆赦皇太子及文武百僚拜舞于下惟樞密使翰林學士相對侍立樓上丙申己亥必大扈從再登麗正門望濤江形勢環抱極壯觀也乾道七年四月甲子詔皇太子判臨安府用至道故事也或謂當以太中大夫為判官通領府事恐名稱未正遂議改尹而以侍從為少尹餘判推官用卿監郎官丁卯將命鎖院降麻給告身或又疑宣麻給告非待儲貳之禮己巳後省官禮官㑹議於史院檢照唐太宗征遼命太子監國及大帝命太子受諸司啟事或詔或制視麻為重可以作則上然之庚午偶當日被宣范紫㣲成大先以侍講遞宿聞報遽出薄莫至玉堂御藥李忘其名持御封御筆皇太子某宜領臨安尹可依此降制三鼓進草因奏此制書既不給告則當付有司施行竊恐皇太子别無被受欲依自來詔書體式格換首尾書寫一通降付皇太子今擬定格式進呈如賜俞允乞速批降付下御筆批依辛未遂告大廷惟此稀闊盛典適以史官備討論詞臣參潤色復得宸翰寳藏于家非儒生之榮遇乎答皇子詔用卿字非是前輩知體則不然其他或汝或王或公皆當有别翰苑嵗進春端貼子如大内多及時事太上則詠逰幸之類必大嘗自徳夀宫後垣趨傳法寺望見一樓巍然朝士云太上名之曰聚逺而自題其額仍大書東坡賴有髙樓能聚逺一時收拾與閒人之詩於屏間又靈隠寺冷泉亭臨安絶景去城既逺難於頻幸乃即宫中鑿大池續竹筒數里引西湖水注之其上疊石為山象飛來峯宛然天成必大作端午帖子云聚逺樓頭面面風冷泉亭下水溶溶人間炎熱何由到真是瑤臺第一重葢謂此也前後頗聞禁籞大略併記于下宫中分四地分隨時逰覽東地分香逺梅堂清深竹堂月臺梅坡松菊三徑菊芙蓉竹清妍􅙐醿清新木犀芙蓉岡南地分載忻大堂御宴處忻忻古栢太湖石射㕔臨賦荷花山子燦錦金林檎至樂池上半丈紅郁李子清曠木犀瀉碧養金魚處西則冷泉古梅文杏館静樂牡丹浣溪大樓子海棠北則絳華羅木亭旱船俯翠茅亭春桃盤松其詳不可得而知也嘗見御製盤松贊墨本云天錫瑞木得自嶔岑枝蟠數萬幹不倍尋怒騰雲勢静奏琴音凌寒鬱茂當暑隂森封以腴壤邇以碧潯越千萬年以慰我心碑在宫中又汪季路逵得御製祭土地文藁真蹟寶藏之其文云維淳熙五年嵗次戊戌十一月日太上皇帝遣具階張宗尹特設牲牢㫖酒珍果香花致祭于本宫土地之神神有百職職各不同典司草木土示是供我逰湖圜乃獲竒松植之禁苑百態千容婆娑偃葢夭矯騰龍翠色凝露清音舞風醉吟閒適予情所鍾培封殖久或力窮鳥烏外擾蟻蠧内攻神其勦絶勿使能終精邪竊據盜斧適逢神其呵逐勿使遺蹤常令勁質坐閲隆冬堅踰五柞弱異雙桐厯千萬年鬱鬱葱葱牲牢㫖酒嗣録汝功尚饗歐陽文忠公學士院草録世已不傳近嵗有玉堂集云是李漢老邴編類亦差訛非全書其中却載皇太子府春端帖子葢政和宣和間所供今東宫乃闕此欲引例為請縁無善本可據且當時不曰宫而曰府遂止王安中内制一例曰閤玉堂雜記卷上
