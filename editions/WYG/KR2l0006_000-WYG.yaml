  text: 欽定四庫全書史部十二
  hash: sha256:683b84fba18cbfaf1b4f7fb7adb0cf04b078729870de9e8d06bf823f11967f61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0006_WYG_000-1a, image: WYG0595/WYG0595-0549a.png}
body:
  text: 玉堂雜記職官類一官制之屬提要臣等謹案玉堂雜記三卷宋周必大撰必大字子充一字洪道廬陵人紹興二十一年進士中宏詞科權中書舍人孝宗朝厯右丞相拜少保進益國公寜宗朝以少傅致仕卒謚文忠事蹟具宋史本傳此書皆記翰林故事後編入必大文集中此乃其别行之本也宋代掌制最號重職徃徃由此致位二府必大受知孝宗兩入翰苑自權直院至學士承㫖皆徧為之凡鑾坡制度沿革及一時宣召奏對之事隨筆紀録集為此編所紀如奉表德夀署名賜安南國王嗣子詔書之類皆能援引古義合於典禮其他瑣聞遺事亦多可資談柄洪遵翰苑羣書所録皆唐代及汴都故帙程俱麟臺故事亦成於紹興間其隆興以後翰林故實惟稍見於館閣續録及洪邁容齋隨筆中得必大此書互相稽考南渡後玉堂舊典亦庶幾乎釐然具矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀玉堂雜記原序必大試館職時太上稱其文諭宰執陳公康伯朱公倬云他日令掌制今上受禪兩月自六察擢左史初對玉音云向在王邸見卿詞科擬制雅宜代言不旋踵遂兼正字其後兩入翰苑首尾十年自權直院至學士承㫖皆徧為之其荷兩朝知遇至矣嵗月既久凡渉典故及聞見可紀者輒筆之淳熙庚子進位二府蘇易簡玉堂之思每切于中因命小子綸裒為一編略加訂其間多涉㡬㣲非止温木或删或留僅得五十餘條前後脞録辭無銓次釐為三卷或可附洪氏翰苑羣書後云壬寅八月十二日周必大題朝佐頃者官桂陽獲觀今丞相周公鑾坡録愛而傳之兹如武林又得其玉堂雜紀益聞所未聞葢中興以來九重之徳美前輩之典刑恩數之異同典故之沿革皆因事而見之此尤不可不傳也乃手抄一通藏於家竊聞公在翰苑知無不言朝廷有大命令人所不敢議者公從容敷奏皆當上意凡所以障隄狂瀾護養元氣者豈止一事而公不書何其謙也然盛徳偉烈表表在人耳目公雖不書其能使之弗傳哉紹興元年重五日樵溪丁朝佐謹書丞相益公玉堂雜紀一編森得之久矣字畫間有舛誤每苦其難讀近訪丁懐忠觀甘泉書藏懐忠不知森有此書出以相示森曰明月夜光天下之所同寳也子獨能私有之乎亟假其夲而參訂之因系嵗月於後紹熈辛亥仲夏一日眉山蘇森謹題
