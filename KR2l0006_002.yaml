body:
  text: 玉堂雜記卷中宋周必大撰乾道七年十二月辛酉有旨僕射之名不正欲採周漢舊制改左右丞相令有司討論必大時為禮部侍郎兼權直學士院又兼同修國史兼實録院修撰皆當與聞會衆議不齊而虞丞相亦謂同北朝官制遷延至明年正月戊寅僅條具歷代宰相官稱申尚書省禁中即聞之明日遣中使王忘其名來問緩故必大以實奏二月癸卯得御筆云尚書左右僕射可依漢制改作左右丞相學士院降詔登時具草封入乙巳付外施行庚戌從駕過德夀官既歸得旨赴東華門祗候宣引日已晡聞有內宴小黃門出云恐改日引然不敢退酉後忽宣入選德殿起居畢上微被酒袖出親劄云比來一二大臣同心輔正夙夜匪懈漸革茍且之風以副綜核之意深可嘉尚今因除授宜示褒典虞允文可特進左丞相梁克家可正奉大夫右丞相御前設小案用牙尺壓蠲紙一幅傍有漆匣小歙硯置筆墨於玉格必大鞠躬書除目進呈訖奏曰拜相轉官前例固不一今並命而或三或四更取聖裁上曰以其協心故褒進之然特進一官即少保所以允文三官又問兼樞密使否上曰今樞密亦非古先改丞相稱呼將來别理會且帶可也又奏所領書局上曰卿自理會賜坐奏問既改左右相其序位如何上曰欲升在三少之上三公之下逮暗請起宣坐賜茶飲訖再拜而退御藥李邦直同自復道秉燭鎖院蓋上意欲其密故不用尋常宣官之禮金蓮故事今庶幾焉凡鎖院御藥監門中官各一員御藥留宿其廳鎖院或先去恐是大禮别有職事昧爽再相見以小字制書本授之送至中門先啓鑰入內即復扄院候俟朝退宣麻訖學士乃得歸時虞公獨相梁為參政聞班列中但謂改易相名及雙制出愕然或疑學士多轉右相一官有所抑揚不敢辨也按祖宗時命相多以舊官其後往往遷秩近嵗敕局修三省法乃著令轉三官兹豈當立法乎乾道七年七月二十六日午後快行家傳旨下學士院取從官為四川宣撫使體例蓋是時參知政事王公明炎在蜀三年屢求歸宰相薦吏部侍郎王能甫之竒為代故來索例必大令回奏云降麻官方屬本院侍從當問三省既暮忽宣鎖至院已秉燭中使出御封御筆乃王炎除樞密使依舊四川宣撫使其密如此吏寫熟狀依例不轉官但加食邑必大方草制未暇細思既得筆依奏方省其誤自寫奏云本朝改官制後以太中大夫為宰執官當時改樞密使為知院事中興以來既復置使首用舊弼故恩數多視宰臣未有以中大夫充者昨汪徹元是通議大夫虞允文太中大夫故不轉官今王炎止是中大夫竊慮合轉左太中大夫仍加封邑庶協近制御筆批依時三鼓批墨尚濕必大初直院見批答臣僚章表皆大書其後不過三兩行表紙盡則接以詔紙數幅文盡乃止然表紙髙詔紙矮參差不等問之掌故並無依據心每疑之其後遍於執政故家求承平時舊本偶得仁宗皇祐間答孫威敏公沔辭免副樞表則所接之紙髙低相若淳熙乙未再叨寓直閏九月十二日因李參彥頴王樞淮斷章批答即具奏照皇祐體式於表後用一等紙書寫進呈仍乞今後準此施行御筆依遂為定制宰執及親王使相太尉生日天章閣排辦牲餼預申學士院撰詔書及寫賜目一紙各請御寶詔用書詔之寶賜用錫賜之寶前一日差內侍持賜其詔例畫撰進之日謂如正月旦生文意必敘嵗首而所畫日則是去臘殊不相應必大為直院奏乞不拘進詔早晚但實畫生日於後得旨從之遂為定制祖宗時牲餼外又錫器幣往往就差子弟姻戚持賜欲其省費也過江惟牲餼耳米麵本色羊準價皆取之有司酒則臨安醖造臨時加以黃封拜賜訖與賜者同升廳搢笏展讀就坐茶湯書送錢十五千從人三千天章閣使臣庫子快行錢酒各有差淳熙丙申八月庚辰德夀宫遣大璫張去為至都堂傳旨立翟貴妃為今上皇后明日午後執政奏事皇后歸姓謝氏乙酉晚快行家來宣鎖院是日侍講刑部侍郎程泰之已宿直呼馬而出豫至內前適與之遇泰之揚鞭云留詩案上矣酉時出自東華門入對選德殿上曰太上有旨立謝后命卿草制必大奏合略及歸姓否上曰不如此四方何由知明言幼隨乳母可也宣坐賜茶訖御藥王濛同入院二鼓後進草畢吏呈泰之詩云抖擻身章却冒塵裊蹄顧影也逡巡鑾坡寓宿非其地蓮燭操文自有真宇直由來同古語位髙兼復見今人迎潮有諾無輕爽季老當年不諉貧謂賜金也豫次韻戲之云天街並踏軟紅塵飛鞚交馳駭徼巡椒殿敢期當制草槐庭元擬用儒真初謂年兄入相鎖院鬻方偶免冬龜手適市深慙旦攫人禮絶同僚應有日重霑潤筆乃無貧謂相制亦賜金也先是七月十九日六曹長二六人往浙江亭觀潮泰之在焉惟豫以內直不赴晡時大雷雨走筆戲蔡子平洸云雷轟萬鼓勒潮回無復亭前雪作堆應為尚書慳且澀盲風怪雨一時來迎潮輕爽之語指此淳熙丙申八月乙未都堂召議賜交趾來年厯日詔書豫謂李天祚去冬已薨龍翰未經封拜欲作安南國王嗣子龍翰執政然之先是豫以兵部職事條具天祚贈典按故事其王初立即封交趾郡王久之進南平王死則贈侍中南越王上以天祚自紹興丁巳嗣位今四十年淳熙元年二月又自南平王特封安南國王故欲厚其禮豫請仍贈侍中追封南越國王詔可之安南為國蓋曽丞相之失聞奏章行移舊止稱安南道加封之後浸自尊大文書稱國不復可改丁酉三月二十四日制授龍翰靜海軍節度觀察處置等使特進檢校太尉兼御史大夫上柱國安南國王食邑三千户食實封一千户仍賜推誠順化功臣豫適當制其云即樂國以肇封既從世襲極真王而錫命何待次升蓋言不封郡王也交州在唐為安南都護府本朝太宗時黎氏奪丁璿節度大中祥符二年李公藴復篡之傳子德政至孫日尊嘗稱帝改元日尊卒乾德嗣卒陽煥嗣卒天祚嗣卒龍翰嗣卒數嵗矣制云乃眷一邦兹傳七世自公藴言之也其名曰日曰乾曰陽曰天曰龍皆有僭上之意然表章字如蠅頭幾不可辨玉音每嘉其恭順云淳熙三年九月二十五日鎖院付下中書門下省熟狀趙伯圭除使相提舉洞霄宫必大奏按故事宗室戚里或前宰執帶節度使多充宫觀使若至使相自領使無疑昨史浩以使相提舉宮觀者誤也恐自此遂以為例今具士樽錢忱等例皆是以使相充宫觀使在外任便居住者合取旨改正一更四點進入五點上批可依士樽等體例除宫觀使是年十一月二十二日御封付下參知政事錢良臣辭免監修國史日厯所劄子降詔不允必大因奏自來宰執兼領書局多是內尚書省批出局名既至朝廷降敕合行寫正而省吏止奉行內批宰執亦隨敕黃繫銜差誤日久今因答詔輒具言之國史日厯者書名也曰所者官司也今大臣合監修日厯却添一所字似監修造作之官又如敕令所從官詳定宰執提舉今却云提舉敕令所此何理也以至國史院會要玉牒皆為一律合行改正上以為允其後或是或否復混淆矣丁酉九月丙辰宣召侍讀史少保浩錫宴澄碧殿抵莫送以金蓮燭宿玉堂直廬上命作詩敘此會史進古詩三十韻云季秋中浣日淳熙隆四􅑤朝回纜轡間中使俄傳旨少頃日轉申宣召陪燕喜預令掃玉堂深夜備棲止悚懼跽承命鳴騶亟穿市絳闕聳皇居非煙常靡靡入自東華門熊羆森爪士詔許乘肩輿安徐無跛倚復古距選德相望幾數里修廊按雲漢岧嶤璨珠蘂中途敞金扉恍若蓬壺裏羣山擁蒼璧四顧環弱水山既日夕佳水亦湛無滓氷簾映綺疏瓊殿中央峙澄碧耀宸奎龍神爭守視蹈舞上丹墀天威不違咫奉觴祈萬夀時蒙一啓齒餘波丐鼠腹酒行不知幾徘徊下瑤席緩步煩玉趾從逰至清激錫坐談名理泉聲韻琴瑟一洗筝笛耳皇云萬機暇觀書每來此論道及帝王直欲齊其軌堯舜禹湯文前身無乃是臣言匪獻諛道實由心起既然明是心要在力行爾登橋釂餘罍飲興未容已金蓮引雙燭再拜離階戺玉音寵諭臣此會宜有紀歸途感恩榮占寫忘骫骳上御製俯同其韻云揖遜荷帝堯寅恭五元􅑤治道貴清靜聖言有深旨誰歌元首明自得股肱喜躋民期仁夀距肯中道止力農樂彼田坐賈安於市嵗行閲豐登國論銷委靡豫力初何能濟濟賴多士矧豫有元老中立而不倚居東逾三年不逺來千里未遂赤松逰輟誦青琅蘂皓首持六經日侍明光裏翼乎鴻遇風縱矣魚在水儒行絶瑕疵道心無塵滓挺挺松柏姿巉巉山嶽峙豫惟日萬幾至仁同一視西成錫小宴促坐才尺咫湛露愧歌周置酒非封齒歸美見新詩如卿能有幾眷言澄碧行勝賞得迂趾亦屢引公卿對此談政理虛心欲受人忠言資逆耳朕瘠天下肥至樂無易此頗念文武疆六合尚殊軌東都會諸侯宣王昔於是期爾罄嘉謀使我勳業起勿以方燕頤所書聊復爾巵酒正須釂話言未能巳都護萬年觴何當至庭戺文章藉老手直筆中興紀載嘉矍鑠翁焉得辭骫骳逮十一月壬寅輪當內直申時二刻宣召至清華閣上曰學士宴見無時最為親近朕和史浩詩待録示卿可和以進此學士職也又云卿想不甚飲比賜宴時見卿面赤却至誠不辭既退中使李肅傳旨賜詩本并戊戌小春茶二十銙葉世英墨五團以代賜酒世英御前墨工也恭進和篇云粵從三代還嵗月過千􅑤時豈無賢君道未契宸旨陛下屢語臣三代而下人君皆不知道煌煌唐太宗勳業在所喜寇攘既掃除蠻貊畢至止循良布郡邑惠政寬獄市忠賢儼班聨切諫柅浮靡關輔羅府兵巖穴聘竒士民生覆盂安國勢泰山倚皇心期過之風下九萬里忠厚培本根文物燦華蘂淳煕貞觀間何啻相表裏屬車尚濤江列障隔淮水天河未洗兵作我太清滓坐令營屯衆久費糗糧峙遺民多雁嗸諸將空虎視安得貫砮楛來貢尺有咫六合混一家耕桑盛生齒願言講治道先務當有幾欲仁斯仁至患在未舉趾而况前史中遺事可尋理衛英爪與牙王魏目兼耳處中賴房杜虛受忘彼此不聞國異政但見車同軌孰云古道難僉曰今王是寸隂聖所競盛德日方起舞干格三苗其效七旬爾軻稱仁無敵傳謂禮可已東鞮及北女看即朝玉戺南山竹易殫陛下功難紀儒館謾獻歌將奈詞之骳是日奏事畢問陛下命臨安府開文海有諸上曰然奏云文選之後有文粹已逺不及所謂文海乃近時江鈿編類殊無倫理書坊刋行可也今降旨校正刻板事體則重恐難傳後莫若委館閣官銓擇本朝文章成一代之書上大以為然曰卿可理會奏乞委館職上曰待差一兩員其後遂付吕伯共祖謙既成上問何以為名必大乞賜名皇朝文鑑上曰善又降旨令必大作序亦既進呈將刋版會有近臣密啓云所載臣僚章疏毁及祖宗政事遂不果刋今其書士大夫或傳之淳熙五年閏六月十二日鎖院付到熟狀皇子魏王自荆南集慶軍節度使開府儀同三司行江陵尹判明州改成德彰信軍節度使行荆州牧必大奏彰信是曹州徽宗曾為節度使即位後升興仁府又親王帶牧合隨本鎮今成德軍即真定府却帶荆州牧非是上批别擬大鎮進入選點更具本鎮帶牧故事來必大又奏去夏魏王除荆南節度使江陵尹誤犯端拱中真宗除授昔政和中已失檢照今因改鎮不敢不審兼兩鎮合帶兩牧仍隨本鎮併於實録中檢故事以進夏夜甚短奏入已三鼓至四鼓末批出只於兩鎮上就本鎮止帶一牧必大遂擬永興成德軍節度使雍州收進入頃之點定然後進草禁中未就寢以待禁中四鼓乃在外三更故事食邑千户以上封侯若拜相雖舊爵卑食邑少亦徑封侯蓋五等伯子男用縣名至侯則升郡當降旨時未知所封何郡第云進封開國侯而已秦丞相薨後初拜沈守約該左相万俟元忠卨右相沈爵歸安縣万俟陽武縣各從其鄉也既相合升郡侯而學士院遂進沈為歸安郡万俟陽武郡初非郡名其誤甚矣當時偶不知改久之因進書轉官方能釐正至今遇恩升郡臣僚院吏及吏部尚復差舛謂如元係吳興縣開國伯則合云進封吳興郡開國侯却云吳興郡進封開國侯殊無義理豫每為正之北門掌內制西掖掌外制是謂兩制又著令自觀文殿大學士至敷文閣待制為侍從官朝廷或詔近臣舉賢議事多云兩省諫議大夫以上尚書省侍郎以上而别言御史中丞學士待制乃為詳備近世相承通稱侍從固已疑混若泛言兩制則非矣紹興二十四年春直學士院湯公思退以禮部侍郎同知貢舉時百官多闕大抵一人兼數職凡進士出身皆入試闈獨留監察御史王公綸蓋備拆號也內制既闕官遂降旨暫權適草劉婉儀進位貴妃制太上稱其有典誥體潤筆殆萬緡賜硯尤竒秦丞相不樂遭論列而去秦薨召還掌內外制知樞密院事垂相而病除大資政留守金陵即其鄉也未第時兄弟就食府庠至是人以為榮尋卒官豫嘗草其致仕制云少則歌鹿鳴而薦於鄉老則釋麟符而居其里考昔人而或有在近嵗以幾希贈官制云古所謂鄉先生者沒則祭於社而後世良二千石民亦奉嘗之爾於二者蓋兼之皆紀實也故事正除六曹侍郎及雜學士以上遇辭免皆降詔不允給舍并權侍郎則否紹興二十七年六月户部王侍郎師心辭給事中亦降不允詔書蓋舊官合答詔也是嵗九月權禮部賀侍郎允中除給事中辭免亦降詔乃誤襲王例非故事也三十年正月權工部王侍郎晞亮遷夕拜不復降詔得之矣明年九月權禮部金侍郎安節亦遷夕拜又誤降詔自後往往無定論院官隨事申明改正為善玉堂雜記卷中
